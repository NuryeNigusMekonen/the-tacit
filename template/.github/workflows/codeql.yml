# CodeQL - GitHub-native deep static security analysis (Tenacious Standard §3).
# Stronger than pattern-based SAST: it data-flow-analyses the code for security
# vulnerabilities. Kept LIGHT for speed: it runs on the default branch (main)
# and weekly - NOT on every PR. Semgrep (make sast) covers per-PR static
# analysis; CodeQL provides the deeper net periodically.
name: codeql

on:
  push:
    branches: ["main"]    # default branch only (not every PR/branch)
  schedule:
    - cron: "0 3 * * 1"   # weekly, Monday 03:00 UTC

permissions:
  contents: read
  security-events: write   # required to upload CodeQL results

jobs:
  analyze:
    if: vars.CI_ENABLED == 'true'   # opt-in CI (Standard §4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add/remove languages to match the project. CodeQL auto-skips if a
        # language has no code. Common: python, javascript-typescript.
        language: ["python", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
