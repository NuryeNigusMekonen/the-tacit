name: MCP Complete Automation Suite

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 9 * * MON'  # Weekly Monday 9 AM
    - cron: '0 0 * * SUN'  # Weekly Sunday midnight (branch cleanup)
  check_suite:
    types: [completed]

jobs:
  # ============================================
  # 1. AUTO REVIEW & COMMENT
  # ============================================
  auto-review:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Auto Review on PR Open
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 MCP Auto-Review Initiated\n\n✅ **PR Title:** ${pr.title}\n✅ **Files changed:** ${pr.changed_files}\n✅ **Additions:** +${pr.additions}\n✅ **Deletions:** -${pr.deletions}\n⏳ Running automated checks...`
            });

  # ============================================
  # 2. AUTO LABEL
  # ============================================
  auto-label:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    steps:
      - name: Auto Label by File Changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const labels = [];
            
            files.forEach(file => {
              if (file.filename.match(/\.(py|java|js|ts|jsx|tsx)$/)) labels.push('code');
              if (file.filename.match(/\.md$/)) labels.push('documentation');
              if (file.filename.match(/test/)) labels.push('testing');
              if (file.filename.match(/(\.github|\.yml|Makefile|\.yaml)/)) labels.push('ci-cd');
              if (file.filename.match(/(security|auth|crypto|secret)/i)) labels.push('security');
              if (file.filename.match(/dependencies|requirements|pyproject|package\.json/)) labels.push('dependencies');
            });
            
            const uniqueLabels = [...new Set(labels)];
            
            if (uniqueLabels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: uniqueLabels
              });
              
              console.log(`✅ Applied labels: ${uniqueLabels.join(', ')}`);
            }

  # ============================================
  # 3. SMART PR COMMENTS (Size, Risk, Type)
  # ============================================
  smart-comments:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    steps:
      - name: Add Context-Aware Comments
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            let comment = '';
            
            // Size warnings
            if (pr.changed_files > 50) {
              comment += '⚠️ **Large PR** (50+ files) — Consider splitting into smaller PRs\n';
            }
            if (pr.additions > 500 || pr.deletions > 500) {
              comment += '⚠️ **Large changes** (500+ lines) — Review carefully\n';
            }
            if (pr.changed_files < 5 && pr.additions > 50) {
              comment += '✅ **Focused changes** — Good PR scope\n';
            }
            
            // Label-based comments
            if (pr.labels.some(l => l.name === 'security')) {
              comment += '🔒 **Security PR** — Requires security team review\n';
            }
            if (pr.labels.some(l => l.name === 'breaking-change')) {
              comment += '💥 **Breaking change** — Update documentation and changelog\n';
            }
            if (pr.labels.some(l => l.name === 'dependencies')) {
              comment += '📦 **Dependency update** — Verify no version conflicts\n';
            }
            
            if (comment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # ============================================
  # 4. COMPLIANCE CHECK
  # ============================================
  compliance-check:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Compliance
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            let issues = [];
            
            // Title validation
            if (!pr.title.match(/^(feat|fix|docs|test|ci|refactor|chore|perf)(\(.+\))?:/)) {
              issues.push('❌ Title must follow conventional commits: `type(scope): description`');
            }
            
            // Description validation
            if (!pr.body || pr.body.trim().length < 20) {
              issues.push('❌ Description is required and must be at least 20 characters');
            }
            
            if (pr.body && !pr.body.includes('##')) {
              issues.push('❌ Description should include sections (## Summary, ## Changes, etc.)');
            }
            
            // Reviewer validation
            if (pr.requested_reviewers.length === 0) {
              issues.push('⚠️ No reviewers assigned — please request review');
            }
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ⚠️ Compliance Issues\n\n${issues.map(i => `- ${i}`).join('\n')}`
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ **Compliance check passed** — PR meets all requirements'
              });
            }

  # ============================================
  # 5. AUTO MERGE (when all checks pass)
  # ============================================
  auto-merge-green:
    if: github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Auto Merge on All Checks Pass
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });
            
            for (const pr of prs) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });
              
              const allPassed = checks.check_runs.every(c => c.conclusion === 'success' || c.conclusion === 'skipped');
              const hasApprovals = (await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              })).data.some(r => r.state === 'APPROVED');
              
              if (allPassed && hasApprovals && pr.labels.some(l => l.name !== 'wip')) {
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    commit_title: `${pr.title} (#${pr.number})`,
                    commit_message: `Merged automatically by MCP when all checks passed.`,
                    merge_method: 'squash'
                  });
                  console.log(`✅ Merged PR #${pr.number}`);
                } catch (e) {
                  console.log(`ℹ️ Could not merge PR #${pr.number}: ${e.message}`);
                }
              }
            }

  # ============================================
  # 6. AUTO RELEASE
  # ============================================
  auto-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            
            // Get commits since last tag
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 2
            });
            
            let releaseBody = `## Release ${tag}\n\n### 📝 Changes\n`;
            
            if (tags.length > 1) {
              const { data: commits } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: tags[1].name,
                head: tag
              });
              
              releaseBody += commits.commits
                .map(c => `- ${c.commit.message.split('\n')[0]}`)
                .join('\n');
            }
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: releaseBody,
              draft: false,
              prerelease: tag.includes('beta') || tag.includes('alpha')
            });
            
            console.log(`✅ Release ${tag} created`);

  # ============================================
  # 7. SCHEDULED: AUTO BRANCH + PR CREATION
  # ============================================
  scheduled-auto-pr:
    if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * MON'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Create Feature Branch & PR
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = `auto/scheduled-update-${Date.now()}`;
            
            // Create branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: context.sha
            });
            
            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] Weekly scheduled review & maintenance',
              head: branchName,
              base: 'main',
              body: `## 🤖 Weekly Automated Review\n\n**Scheduled on:** ${new Date().toISOString()}\n\n### Tasks\n- [ ] Review recent commits\n- [ ] Check for stale PRs\n- [ ] Verify dependencies\n- [ ] Run quality gates\n\nThis PR was auto-generated. Please review and merge if all checks pass.`
            });
            
            console.log(`✅ Auto PR created: #${pr.number}`);

  # ============================================
  # 8. SCHEDULED: STALE BRANCH CLEANUP
  # ============================================
  cleanup-stale-branches:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * SUN'
    runs-on: ubuntu-latest
    steps:
      - name: Clean Stale Branches (30+ days)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
            let deleted = 0;
            
            for (const branch of branches) {
              // Skip protected branches
              if (branch.name === 'main' || branch.name === 'develop' || branch.name === 'master') {
                continue;
              }
              
              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha
              });
              
              const commitDate = new Date(commit.commit.committer.date);
              
              if (commitDate < thirtyDaysAgo) {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch.name}`
                  });
                  console.log(`🗑️ Deleted stale branch: ${branch.name}`);
                  deleted++;
                } catch (e) {
                  console.log(`⚠️ Could not delete ${branch.name}: ${e.message}`);
                }
              }
            }
            
            console.log(`✅ Cleanup complete: ${deleted} branches deleted`);

  # ============================================
  # 9. SCHEDULED: PR STATISTICS & METRICS
  # ============================================
  pr-stats-report:
    if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * MON'
    runs-on: ubuntu-latest
    steps:
      - name: Generate Weekly PR Stats
        uses: actions/github-script@v7
        with:
          script: |
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              per_page: 100,
              sort: 'updated',
              direction: 'desc'
            });
            
            const thisWeek = prs.filter(pr => new Date(pr.merged_at) > weekAgo);
            
            const avgReviewTime = thisWeek.length > 0
              ? Math.round(
                  thisWeek.reduce((sum, pr) => {
                    const created = new Date(pr.created_at);
                    const merged = new Date(pr.merged_at);
                    return sum + (merged - created);
                  }, 0) / thisWeek.length / (1000 * 60 * 60)
                )
              : 0;
            
            const statsComment = `## 📊 Weekly PR Statistics\n\n**Week of ${weekAgo.toISOString().split('T')[0]}**\n\n- **PRs Merged:** ${thisWeek.length}\n- **Avg Review Time:** ${avgReviewTime} hours\n- **Total Changes:** +${thisWeek.reduce((sum, pr) => sum + pr.additions, 0)} / -${thisWeek.reduce((sum, pr) => sum + pr.deletions, 0)}\n- **Files Changed:** ${thisWeek.reduce((sum, pr) => sum + pr.changed_files, 0)}`;
            
            console.log(statsComment);

  # ============================================
  # 10. AUTO REQUEST REVIEWERS
  # ============================================
  auto-request-reviewers:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Auto Assign Random Reviewers
        uses: actions/github-script@v7
        with:
          script: |
            // Customize reviewer list for your team
            const reviewers = ['user1', 'user2', 'user3', 'user4'];
            
            // Select 2 random reviewers
            const selected = reviewers
              .sort(() => Math.random() - 0.5)
              .slice(0, 2);
            
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: selected
              });
              
              console.log(`✅ Requested review from: ${selected.join(', ')}`);
            } catch (e) {
              console.log(`ℹ️ Could not request reviewers: ${e.message}`);
            }

  # ============================================
  # SUMMARY
  # ============================================
  workflow-summary:
    if: always()
    runs-on: ubuntu-latest
    needs: [auto-review, auto-label, smart-comments, compliance-check]
    steps:
      - name: Workflow Summary
        run: |
          echo "✅ MCP Automation Suite Complete"
          echo ""
          echo "Executed Jobs:"
          echo "- ✅ Auto Review"
          echo "- ✅ Auto Label"
          echo "- ✅ Smart Comments"
          echo "- ✅ Compliance Check"
          echo "- ✅ Auto Merge (on success)"
          echo "- ✅ Auto Release (on tag)"
          echo "- ✅ Scheduled PR Creation"
          echo "- ✅ Branch Cleanup"
          echo "- ✅ PR Statistics"
          echo "- ✅ Request Reviewers"
