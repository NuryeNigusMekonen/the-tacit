# CodeQL - GitHub-native deep static security analysis.
# Stronger than pattern-based SAST: it data-flow-analyses the code for security
# vulnerabilities. Kept LIGHT for speed: it runs on the default branch (main)
# and weekly - NOT on every PR. Semgrep (make sast) covers per-PR static
# analysis; CodeQL provides the deeper net periodically.
name: codeql

on:
  push:
    branches: ["main"]    # default branch only (not every PR/branch)
  schedule:
    - cron: "0 3 * * 1"   # weekly, Monday 03:00 UTC

permissions:
  contents: read
  security-events: write   # required to upload CodeQL results

jobs:
  analyze:
    if: vars.CI_ENABLED == 'true'   # opt-in CI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Languages analysed with build-mode: none - safe to list even when the
        # repo doesn't use them (CodeQL finds no code and the job is a quick
        # no-op, so these never fail a project that lacks the language).
        #
        # COMPILED LANGUAGES (Go, C/C++) need a real build (build-mode:
        # autobuild) and would FAIL on a repo that doesn't use them, so they are
        # NOT listed by default. A Go or C/C++ project should add its entry, e.g.:
        #   - language: go
        #     build-mode: autobuild
        #   - language: c-cpp
        #     build-mode: autobuild
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: none
          - language: csharp
            build-mode: none
          - language: ruby
            build-mode: none
          - language: rust
            build-mode: none
          - language: swift
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
