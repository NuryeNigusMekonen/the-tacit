# Test enforcement (Tenacious Standard §1, §6) - makes testing real, not optional.
# Language-agnostic: CI calls `make coverage`, and the Makefile runs the right
# tool for the project's stack (or whatever a team fills in for Go/Rust/etc.).
# The "changed-code-needs-a-test" check below is pure git, so it works anywhere.
name: coverage

on:
  pull_request:

permissions:
  contents: read

env:
  MIN_COVERAGE: "60"   # starting threshold; raise as the suite grows.

jobs:
  coverage:
    name: coverage
    if: vars.CI_ENABLED == 'true'   # opt-in CI (Standard §4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Provide common runtimes; the Makefile uses whichever the repo needs.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Coverage (make coverage)
        run: make coverage

      - name: Guard against a silent pass (Python code but no tests collected)
        run: |
          set -euo pipefail
          # Only meaningful for Python projects; skip otherwise.
          if [ -f pyproject.toml ] || ls requirements*.txt >/dev/null 2>&1 || git ls-files '*.py' | grep -q .; then
            pip install pytest >/dev/null 2>&1 || true
            collected=$(pytest --collect-only -q 2>/dev/null | grep -cE '::' || true)
            if [ "$collected" -eq 0 ]; then
              echo "::warning::Python code is present but pytest collected ZERO tests. A green 'coverage' check here does NOT mean the code is tested - check your test layout / Makefile (Standard §1)."
            else
              echo "pytest collected $collected test(s) - coverage check is meaningful."
            fi
          else
            echo "No Python project - test-collection guard skipped."
          fi

  changed-code-needs-test:
    name: changed-code-needs-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for tests in the diff
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only "$base" HEAD)
          # Source files vs test files - language-agnostic by name convention.
          code=$(echo "$changed" | grep -E '\.(py|js|jsx|ts|tsx|go|rs|java|rb|php|cs|kt|swift|c|cpp)$' | grep -viE '(test|spec|_test\.)' || true)
          tests=$(echo "$changed" | grep -iE '(test|spec|_test\.)' || true)
          if [ -n "$code" ] && [ -z "$tests" ]; then
            echo "::warning::This PR changes code but adds/updates no tests. Add proportionate tests (Standard §1)."
          else
            echo "Test check OK."
          fi
