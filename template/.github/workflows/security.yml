# Security checks (Tenacious Standard §3) - secret scanning + static analysis.
# Language-agnostic: secret scanning is text-based (any language); SAST runs via
# `make sast`, so each project's Makefile decides the right analyzer for its
# stack (Semgrep is multi-language and runs for all).
name: security

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  secret-scan:
    # Primary: Gitleaks (the OSS standard, entropy + rules). Fallback: the
    # zero-dep kit scanner, which always runs so protection holds with no extra
    # tooling. Both are language-agnostic (text-based).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (primary secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE only needed for org-owned repos; omit for personal.
        continue-on-error: true   # zero-dep scanner below is the hard gate
      - name: Zero-dep scanner (always runs, hard gate)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files || true)
          if [ ${#files[@]} -gt 0 ] && [ -f scripts/secret-scan.sh ]; then
            bash scripts/secret-scan.sh "${files[@]}"
          else
            echo "secret-scan: no scanner script or no files; skipping."
          fi

  sast:
    # Static analysis via the Makefile - language-agnostic at the CI layer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: SAST (make sast)
        run: make sast

  # Single status check named "security" that branch protection can require.
  security:
    name: security
    needs: [secret-scan, sast]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All security checks passed."
