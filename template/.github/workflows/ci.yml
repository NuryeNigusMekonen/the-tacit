# CI - the required checks behind the PR merge gate (Tenacious Standard §4).
# CI runs the SAME `make` targets a developer runs locally, so local and
# pipeline behaviour stay identical. The Makefile auto-detects Python/Node and
# runs the right commands; CI just provides the runtimes and calls make.
name: ci

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Provide both runtimes; the Makefile uses whichever the repo needs.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (make install)
        run: make install

      - name: Lint (make lint)
        run: make lint

      - name: Test (make test)
        run: make test

      - name: Build (make build)
        run: make build
